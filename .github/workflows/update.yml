name: Add posts and rebuild site

# 1. Processes ideas from scripts/post_ideas.txt that don't have a
#    content/posts/*.json file yet, and — once that queue runs dry — has
#    Claude invent new topics itself (checking against what's already
#    published to avoid repeats). Each run is capped at POSTS_PER_RUN new
#    posts (see generate_post.py) to keep API spend predictable.
#    Needs TMDB_API_KEY + ANTHROPIC_API_KEY secrets.
# 2. Refreshes content/trailers.json with the latest upcoming-movie
#    trailers straight from TMDB (scripts/update_trailers.py) — no Claude
#    involved, just overwritten fresh every run so the homepage's "Latest
#    Trailers" shelf never goes stale. Needs TMDB_API_KEY only.
# 3. Pulls real engagement numbers (pageviews, reactions, shares) straight
#    from Google Analytics via scripts/fetch_engagement.py and writes
#    content/engagement.json — this is what powers the site's "Trending"
#    view as a genuine ranking rather than a guess. Best-effort: if the GA4
#    secrets below aren't set, or the API call fails for any reason, this
#    step just leaves engagement data as-is rather than failing the run —
#    Trending quietly falls back to matching Newest until it's configured.
#    Needs GA4_PROPERTY_ID + GA4_SERVICE_ACCOUNT_JSON secrets.
# 4. Always rebuilds docs/ from content/posts/ with build_site.py — pure
#    Python standard library, no npm/Node involved.
# 5. Commits content/, docs/, and scripts/post_ideas.txt (self-generated
#    ideas get appended there as an audit trail) if anything changed, and
#    retries the push (merging in whatever's newly on the remote and
#    rebuilding docs/ against it) if two runs happen to overlap and one's
#    push gets rejected — see the long comment on that step below for why.
#
# GitHub Pages should be set to "Deploy from a branch: main / docs" (Settings
# → Pages), so this push is what actually publishes the site — no separate
# deploy step needed.
#
# Runs 4x/day; at up to 2 posts/run that's roughly 4-8 new posts/day. Adjust
# the cron below or POSTS_PER_RUN in generate_post.py to change the volume —
# each post costs roughly $0.15-0.20 in Claude API usage, so this schedule
# runs somewhere around $20-40/month. Check actual usage in the Anthropic
# Console after a few days to confirm real-world cost.

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}
  schedule:
    # Offset to :23 past the hour rather than exactly on it — GitHub's own
    # docs/community reports note scheduled workflows queue up and get
    # delayed most right at :00 (sometimes by 30-60+ min) since that's when
    # every cron job on GitHub fires at once. :23 is comfortably clear of
    # that pile-up and isn't a "round" minute (:15/:30/:45) that other
    # people commonly pick either. Four evenly-spaced runs (every 6 hours)
    # spreads new content across the whole day instead of a few bigger
    # bursts, so the site keeps feeling freshly updated around the clock.
    - cron: "23 0,6,12,18 * * *"  # ~00:23, 06:23, 12:23, 18:23 UTC every day

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate any missing posts
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_post.py

      - name: Fetch latest movie trailers
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scripts/update_trailers.py

      - name: Fetch engagement data from Google Analytics
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
        run: python scripts/fetch_engagement.py

      - name: Build static HTML
        run: python build_site.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "clapperboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/posts/ content/trailers.json content/engagement.json docs/ scripts/post_ideas.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update site: $(date -u +%Y-%m-%d)"

          # docs/ is fully regenerated from content/ on every run, so if a
          # concurrent run (the schedule firing while a manual run is still
          # going, or two manual runs close together) pushes first, a plain
          # retry would mean text-merging generated HTML/XML that both runs
          # rewrote in full — every post-listing page and the sitemap change
          # whenever ANY post is added, which is exactly the kind of conflict
          # git can't resolve on its own. So each retry instead: merges in
          # whatever's now on the remote (the new content/posts/*.json files
          # from the other run merge in automatically, since two runs
          # essentially never pick the same slug; any real conflict is only
          # possible on generated/snapshot files — docs/, trailers.json,
          # engagement.json, or the post_ideas.txt audit log — none of which
          # is hand-authored content worth fighting over, so -X ours resolves
          # those silently in favor of this run's own copy), then rebuilds
          # docs/ from scratch against the now-complete merged content set —
          # so what actually gets pushed always reflects every post from both
          # runs combined, never a stale or half-conflicted build.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt/5) — merging latest remote state and retrying..."
            git fetch origin main
            git merge origin/main --no-edit -X ours
            python build_site.py
            git add docs/
            if ! git diff --cached --quiet; then
              git commit -m "Rebuild after merge"
            fi
            sleep $((RANDOM % 8 + 2))
          done
          echo "Failed to push after 5 attempts — giving up for this run."
          exit 1
